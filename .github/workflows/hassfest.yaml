name: Validate with hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare custom component layout
        run: |
          mkdir -p /tmp/hassfest/custom_components/myleonardo
          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".coverage" \
            --exclude ".pytest_cache" \
            --exclude "__pycache__" \
            --exclude "tests" \
            ./ /tmp/hassfest/custom_components/myleonardo/
      - name: Run hassfest
        run: |
          docker run --rm \
            -v /tmp/hassfest:/github/workspace \
            ghcr.io/home-assistant/hassfest
